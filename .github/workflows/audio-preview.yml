name: audio-preview

# Re-render every phase's audio on every commit and publish a single
# play-in-browser preview page to GitHub Pages.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity-check reward functions
        run: |
          pip install pytest
          python -m pytest tests/ -q

      - name: Train Phase 1 (fresh, per commit)
        run: |
          python -m src.train.reinforce --steps 1500 --seed 0
          python -m src.train.plot

      - name: Render audio for every committed phase
        run: |
          python -m src.render.render_phases

      - name: Print quantitative report
        run: |
          python -m src.analysis.report | tee results/QUANTITATIVE_REPORT.txt

      - name: Build preview site
        run: |
          python scripts/build_preview.py

      - name: Upload preview as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-preview-${{ github.sha }}
          path: preview/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
